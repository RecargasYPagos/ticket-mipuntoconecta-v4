localStorage.getItem("folio")||0;

consecutivo++;

"folio",

function generarTicketRecarga(){

let monto=parseFloat(
b.querySelector(".monto").value

let beneficioTexto=

totalRecargas+=monto;

totalComision+=CONFIG.comisionRecarga;

texto+=
"--------------------------------\n";

texto+=
"RECARGA "+(i+1)+"\n\n";

texto+=
"OPERADORA: "+operadora+"\n";

texto+=
"NUMERO: "+numero+"\n";

texto+=
"MONTO: $"+monto.toFixed(2)+"\n";

texto+=
"COMISION: $"+
CONFIG.comisionRecarga.toFixed(2)+"\n\n";

texto+=
"BENEFICIOS:\n";

texto+=
beneficioTexto+"\n\n";

});

}
